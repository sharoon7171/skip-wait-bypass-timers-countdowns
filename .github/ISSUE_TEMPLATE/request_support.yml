name: Request a website
description: Ask to add support for a website that shows a countdown or wait page
title: "[Request] "
labels: ["request-support"]
body:
  - type: input
    id: website
    attributes:
      label: Website or link
      placeholder: https://example.com or example.com
    validations:
      required: true
  - type: textarea
    id: where_timer
    attributes:
      label: Where does the website show the timer?
      description: How can you see the timer? (e.g. after opening the link, after clicking a button)
      placeholder: e.g. I open the link, then a countdown appears before the real page.
    validations:
      required: true
